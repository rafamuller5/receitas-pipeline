name: CI/CD - sistema-receitas

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  IMAGE_NAME: sistema-receitas

jobs:

  # ───────────────────────────────────────────────
  # Etapas D (testes) e E (qualidade de código) + build da imagem
  # ───────────────────────────────────────────────
  build-test-quality:
    runs-on: self-hosted   # roda na VM da Univates (runner registrado lá)

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ---- Build da imagem Docker da aplicação (PHP + mysqli + Composer já incluídos) ----
      - name: Build da imagem Docker
        run: sudo docker build -t ${IMAGE_NAME}:${{ github.sha }} -t ${IMAGE_NAME}:latest .

      # ---- D) Testes automatizados (20 testes) ----
      # Roda dentro do container (a VM não precisa ter PHP/Composer instalados).
      # phpunit.xml já gera: reports/junit-report.xml, reports/clover.xml, reports/teamcity.txt
      - name: Instalar dependências e rodar testes PHPUnit (dentro do container)
        run: |
          sudo docker run --rm \
            -v ${{ github.workspace }}:/var/www/html \
            -w /var/www/html \
            ${IMAGE_NAME}:latest \
            bash -c "composer install --no-interaction --prefer-dist && vendor/bin/phpunit --configuration phpunit.xml"

      # O container roda como root, então os arquivos gerados (reports/, vendor/)
      # ficam com dono root no host. Devolve a posse pro usuário do runner para
      # os próximos passos (upload-artifact, sonar scan) conseguirem ler tudo.
      - name: Corrigir permissões dos arquivos gerados pelo container
        if: always()
        run: sudo chown -R $(id -u):$(id -g) ${{ github.workspace }}

      - name: Publicar estatísticas dos testes no resumo do GitHub Actions
        uses: test-summary/action@v2
        with:
          paths: reports/junit-report.xml
        if: always()

      - name: Upload dos relatórios de teste (artefato)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: relatorio-testes
          path: reports/

      # ---- E) Análise de qualidade de código ----
      # Usa o sonar-project.properties já existente no repositório
      - name: SonarQube Cloud Scan
        uses: SonarSource/sonarqube-scan-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

  # ───────────────────────────────────────────────
  # Etapa F) Atualização do ambiente de Homologação
  # ───────────────────────────────────────────────
  deploy-homolog:
    needs: build-test-quality
    runs-on: self-hosted
    environment: homologacao
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Subir/atualizar contêineres de Homologação
        run: sudo docker compose -f docker-compose.homolog.yml up -d --build

      - name: Aguardar MySQL ficar pronto (Homologação)
        run: |
          for i in $(seq 1 40); do
            if sudo docker run --rm --network receitas-net mysql:8.0 \
                 mysqladmin ping -h mysql-homolog -uroot -proot_pass --silent 2>/dev/null; then
              echo "MySQL pronto."
              break
            fi
            echo "Aguardando MySQL... ($i/40)"
            sleep 3
          done

      - name: Versionamento do banco de dados (Flyway) - Homologação
        run: |
          sudo docker run --rm --network receitas-net \
            -v ${{ github.workspace }}/flyway/sql:/flyway/sql \
            -v ${{ github.workspace }}/flyway.homolog.conf:/flyway/conf/flyway.conf \
            flyway/flyway:10 repair migrate

      - name: Smoke test - aplicação respondendo em Homologação
        run: curl -fsS http://localhost:8081 || (echo "Homolog não respondeu" && exit 1)

  # ───────────────────────────────────────────────
  # Etapa G) Atualização do ambiente de Produção
  # ───────────────────────────────────────────────
  deploy-prod:
    needs: deploy-homolog
    runs-on: self-hosted
    environment: producao
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Subir/atualizar contêineres de Produção
        run: sudo docker compose -f docker-compose.prod.yml up -d --build

      - name: Aguardar MySQL ficar pronto (Produção)
        run: |
          for i in $(seq 1 40); do
            if sudo docker run --rm --network receitas-net mysql:8.0 \
                 mysqladmin ping -h mysql-prod -uroot -proot_pass --silent 2>/dev/null; then
              echo "MySQL pronto."
              break
            fi
            echo "Aguardando MySQL... ($i/40)"
            sleep 3
          done

      - name: Versionamento do banco de dados (Flyway) - Produção
        run: |
          sudo docker run --rm --network receitas-net \
            -v ${{ github.workspace }}/flyway/sql:/flyway/sql \
            -v ${{ github.workspace }}/flyway.prod.conf:/flyway/conf/flyway.conf \
            flyway/flyway:10 repair migrate

      - name: Smoke test - aplicação respondendo em Produção
        run: curl -fsS http://localhost:8082 || (echo "Produção não respondeu" && exit 1)
